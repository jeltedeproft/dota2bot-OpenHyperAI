name: Validate

on:
    push:
        branches: [main]
    pull_request:

jobs:
    validate:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Check Prettier formatting
              # Prettier has no Lua parser — only check TypeScript sources
              run: npx prettier ./typescript --check

            - name: Validate hero files
              run: node scripts/validate-heroes.js
